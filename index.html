<script src="https://js.paystack.co/v1/inline.js"></script>

<script>
function pay(){
  let handler = PaystackPop.setup({
    key: "pk_test_ceeeb15cb1285cf8ea6b0b8311a32befe74bc680",
    email: "suf81623@gmail.com",
    amount: 2000 * 100, // kobo

      alert("Payment cancelled");

  handler.openIframe();
